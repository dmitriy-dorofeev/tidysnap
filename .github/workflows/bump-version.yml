name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Тип инкремента версии'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          MAJOR=$(echo "$LAST_TAG" | sed 's/v\([0-9]*\).*/\1/')
          MINOR=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
          PATCH=$(echo "$LAST_TAG" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')

          BUMP="${{ github.event.inputs.bump }}"
          if [ "$BUMP" = "major" ]; then
            NEXT="v$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEXT="v${MAJOR}.$((MINOR + 1)).0"
          else
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Next tag: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  release:
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch new tag
        run: git fetch origin tag "${{ needs.bump.outputs.tag }}" --no-tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.bump.outputs.tag }}
