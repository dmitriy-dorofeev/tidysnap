name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Найдены неотформатированные файлы:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Install analyzers
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2026.1
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.11

      - name: Staticcheck
        run: staticcheck ./...

      - name: Govulncheck
        run: govulncheck ./...

      - name: Gosec
        run: gosec -exclude=G404 ./...

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -o tidysnap ./cmd
